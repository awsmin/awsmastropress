# Root wrangler config — shared bindings reference
# Each app has its own wrangler.toml for deployment

name = "awsmastropress"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "astropress"
database_id = "2f3cdc81-1b95-4863-bddb-dcddbf5f909c"

[[r2_buckets]]
binding = "R2"
bucket_name = "astropress-media"
